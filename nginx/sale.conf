# Konfigurasi ini di-paste ke AAPanel sebagai custom NGINX config
# Setelah domain sudah di-setup di AAPanel, tambahkan block ini

upstream sale_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

upstream sale_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name sale.example.com;  # Ganti dengan domain Anda

    # Redirect HTTP ke HTTPS (AAPanel akan handle Let's Encrypt)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sale.example.com;  # Ganti dengan domain Anda

    # SSL dikelola AAPanel (Let's Encrypt)
    # ssl_certificate dan ssl_certificate_key akan di-inject AAPanel

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # API routes
    location /api/ {
        proxy_pass http://sale_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE: disable buffering
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
        proxy_set_header X-Accel-Buffering no;
    }

    # Health check (optional)
    location /health {
        proxy_pass http://sale_api/health;
    }

    # Web app (Next.js)
    location / {
        proxy_pass http://sale_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Next.js static files cache
        location /_next/static/ {
            proxy_pass http://sale_web;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
