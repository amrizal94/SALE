version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sale_db
      POSTGRES_USER: sale_user
      POSTGRES_PASSWORD: changeme
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sale_user -d sale_db']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://sale_user:changeme@postgres:5432/sale_db
      JWT_SECRET: dev-secret-change-in-production
      API_PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: development
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/db/src:/app/packages/db/src
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SSE_URL: http://localhost:4000/api/sse
      NODE_ENV: development
    volumes:
      - ./apps/web:/app/apps/web
    depends_on:
      - api

volumes:
  postgres_data:
